name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test and package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $pluginVersion = (Select-String -Path addons/mnemonic/plugin.cfg -Pattern 'version="([^"]+)"').Matches[0].Groups[1].Value
          if ($version -ne $pluginVersion) {
            throw "Tag version $version does not match plugin.cfg version $pluginVersion"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          ./scripts/package-release.ps1 -Version $version -SkipTest

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mnemonic-${{ env.VERSION }}.zip
